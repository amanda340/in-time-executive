<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#07101C"/>
  <title>In Time Executive</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --ink:#07101C;
      --ink2:#0D1A2D;
      --gold:#E8A800;
      --gold2:#F5C430;
      --cream:#F0EBE1;
      --muted:#8A919E;
      --green:#25D366;
    }
    body{
      background:var(--ink);
      color:var(--cream);
      font-family:'Jost',sans-serif;
      font-weight:300;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem 1rem;
    }
    .card{
      width:100%;
      max-width:400px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }

    /* HERO TOP */
    .hero-top{
      width:100%;
      background:var(--ink2);
      border-radius:16px 16px 0 0;
      padding:2.4rem 1.5rem 1.8rem;
      text-align:center;
      border:1px solid rgba(232,168,0,.15);
      border-bottom:none;
      position:relative;
      overflow:hidden;
    }
    .hero-top::before{
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:3px;
      background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
    }
    .logo-wrap{
      margin-bottom:1rem;
    }
    .logo-wrap img{
      height:56px;
      object-fit:contain;
    }
    .tagline{
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:.9rem;
      color:var(--gold);
      letter-spacing:.04em;
    }
    .divider{
      width:40px;height:1px;
      background:rgba(232,168,0,.3);
      margin:1rem auto 0;
    }

    /* BUTTONS */
    .buttons{
      width:100%;
      background:var(--ink2);
      border:1px solid rgba(232,168,0,.15);
      border-top:none;
      border-bottom:none;
      padding:.5rem 1.2rem;
      display:flex;
      flex-direction:column;
      gap:.55rem;
    }
    .btn{
      display:flex;
      align-items:center;
      gap:.9rem;
      padding:.9rem 1.1rem;
      border-radius:10px;
      text-decoration:none;
      font-size:.88rem;
      font-weight:500;
      color:var(--cream);
      background:rgba(255,255,255,.04);
      border:1px solid rgba(232,168,0,.1);
      transition:background .2s, border-color .2s, transform .15s;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
    }
    .btn:active{transform:scale(.97);background:rgba(255,255,255,.08)}
    .btn.primary{
      background:var(--green);
      border-color:transparent;
      color:#fff;
      font-weight:600;
    }
    .btn.primary:active{background:#1fba5a}
    .btn.gold{
      background:var(--gold);
      border-color:transparent;
      color:var(--ink);
      font-weight:700;
    }
    .btn.gold:active{background:var(--gold2)}
    .btn-icon{
      width:38px;height:38px;
      border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      background:rgba(255,255,255,.08);
    }
    .btn.primary .btn-icon{background:rgba(255,255,255,.2)}
    .btn.gold .btn-icon{background:rgba(7,16,28,.15)}
    .btn-icon svg{width:20px;height:20px}
    .btn-text{
      display:flex;flex-direction:column;line-height:1.2;
    }
    .btn-label{font-size:.78rem;opacity:.65;font-weight:300}
    .btn-main{font-size:.9rem}

    /* SECTION DIVIDER */
    .section-sep{
      width:100%;
      padding:.4rem 1.2rem;
      background:var(--ink2);
      border-left:1px solid rgba(232,168,0,.15);
      border-right:1px solid rgba(232,168,0,.15);
    }
    .sep-label{
      font-size:.58rem;font-weight:600;
      letter-spacing:.2em;text-transform:uppercase;
      color:rgba(232,168,0,.4);
      display:flex;align-items:center;gap:.5rem;
    }
    .sep-label::before,.sep-label::after{
      content:'';flex:1;height:1px;
      background:rgba(232,168,0,.1);
    }

    /* FOOTER */
    .card-footer{
      width:100%;
      background:var(--ink2);
      border-radius:0 0 16px 16px;
      padding:1.2rem 1.5rem 1.5rem;
      text-align:center;
      border:1px solid rgba(232,168,0,.15);
      border-top:1px solid rgba(232,168,0,.08);
    }
    .footer-logo{
      font-family:'Playfair Display',serif;
      font-size:.8rem;font-weight:700;
      color:var(--gold);letter-spacing:.1em;
      margin-bottom:.2rem;
    }
    .footer-sub{font-size:.68rem;color:var(--muted)}
  </style>
</head>
