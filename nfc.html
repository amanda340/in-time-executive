<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#07101C"/>
  <title>In Time Executive</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --ink:#07101C;--ink2:#0D1A2D;
      --gold:#C8970A;
      --cream:#F0EBE1;--muted:#8A919E;--green:#25D366;
    }
    body{
      background:var(--ink);
      color:var(--cream);
      font-family:'Jost',sans-serif;
      font-weight:300;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:1.2rem 1rem 2rem;
    }
    .card{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}

    /* HERO COM FOTO */
    .hero{
      width:100%;position:relative;
      height:220px;overflow:hidden;
    }
    .hero img.bg{
      width:100%;height:100%;object-fit:cover;object-position:center 40%;
      display:block;
    }
    .hero-ov{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(7,16,28,1) 0%,rgba(7,16,28,.55) 50%,rgba(7,16,28,.15) 100%);
    }
    .hero-top-bar{
      position:absolute;top:0;left:0;right:0;
      height:3px;
      background:linear-gradient(90deg,var(--gold),#F5C430,var(--gold));
    }
    .hero-content{
      position:absolute;bottom:0;left:0;right:0;
      padding:1rem 1.4rem 1.2rem;
      text-align:center;
    }
    .hero-content img{height:46px;object-fit:contain;margin-bottom:.45rem}
    .tagline{
      font-family:'Playfair Display',serif;
      font-style:italic;font-size:.82rem;
      color:rgba(240,235,225,.75);letter-spacing:.03em;
    }

    /* BODY */
    .card-body{
      width:100%;
      background:var(--ink2);
      padding:.6rem 1.1rem .9rem;
      display:flex;flex-direction:column;gap:.5rem;
    }

    /* BUTTONS */
    .btn{
      display:flex;align-items:center;gap:.85rem;
      padding:.82rem 1rem;border-radius:10px;
      text-decoration:none;
      font-size:.88rem;font-weight:500;
      color:var(--cream);
      background:rgba(255,255,255,.04);
      border:1px solid rgba(232,168,0,.12);
      transition:background .18s,transform .13s;
      cursor:pointer;
    }
    .btn:active{transform:scale(.97);background:rgba(255,255,255,.08)}

    .btn.primary{background:rgba(255,255,255,.04);border-color:rgba(37,211,102,.25);color:var(--cream);font-weight:500}
    .btn.primary:active{background:rgba(255,255,255,.08)}

    /* Salvar contato — escuro com borda dourada (sem amarelo forte) */
    .btn.save{
      background:rgba(200,151,10,.1);
      border:1px solid rgba(200,151,10,.35);
      color:var(--cream);
    }
    .btn.save:active{background:rgba(200,151,10,.18)}

    .btn-icon{
      width:36px;height:36px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;background:rgba(255,255,255,.07);
    }
    .btn.primary .btn-icon{background:rgba(37,211,102,.12)}
    .btn.save .btn-icon{background:rgba(200,151,10,.15)}
    .btn-icon svg{width:19px;height:19px}
    .btn-text{display:flex;flex-direction:column;line-height:1.25}
    .btn-label{font-size:.72rem;opacity:.55;font-weight:300}
    .btn-main{font-size:.88rem}

    .sep{
      display:flex;align-items:center;gap:.5rem;
      padding:.1rem 0;
    }
    .sep span{font-size:.56rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(200,151,10,.4);white-space:nowrap}
    .sep::before,.sep::after{content:'';flex:1;height:1px;background:rgba(200,151,10,.1)}

    /* FOOTER */
    .card-footer{
      width:100%;background:rgba(7,16,28,.8);
      padding:.9rem 1.4rem 1rem;text-align:center;
      border-top:1px solid rgba(200,151,10,.1);
    }
    .footer-logo{font-family:'Playfair Display',serif;font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.1em}
    .footer-sub{font-size:.64rem;color:var(--muted);margin-top:.15rem}
  </style>
</head>
